<html>
    <head>
        <title>
            Dom method
        </title>
        <style>

        </style>
    </head>
    <body>
        <h1 id="title" style="text-align:center"> Dom Method Demo</h1>
        <p class="text"> click button below to see different method</p>
        <div id="container">
        <div class="box">Box 1</div><br><br>
        <div class="box">Box 2</div><br><br>
        </div>

        <button onclick="changeText()">
            getElementById()
        </button>
        <br><br>

        <button onclick="changeColor()">
            querySelector()
        </button>
        <br><br>

        <button onclick="changeBoxes()">
            getElementsByClassName()
        </button>
        <br><br>

        <button onclick="createParagraph()">
          createElement() + appendChild()
        </button>
        <br><br>

        <button onclick="removeParagraph()">
          removeChild()
        </button>
        <br><br>

       <script>

        function changeText()
        {
            document.getElementById("title").innerText=
            "text change using getElementById";
        }

        function changeColor()
        {
            const para = document.querySelector(".text");
            para.style.color = "red";
            para.style.fontWeight = "bold";
        }

        function changeBoxes()
        {
            const boxes = document.getElementsByClassName("box");
            for (let i=0; i< boxes.length; i++)
            {
               boxes[i].style.background = "orange";
               boxes[i].style.color = "white";
            }
        }

        function createParagraph() 
        {
             const p = document.createElement("p");
             p.id = "newPara";
             p.innerText = "Created using createElement()";
             document.body.appendChild(p);
        }

        function removeParagraph() 
        {
          const p = document.getElementById("newPara");
        if (p)
         {
           document.body.removeChild(p);
          }
        }

       </script>
    </body>
</html>
